# =============================================================================
# DataAgent Docker Compose 設定
# instance-config.md の設定に準拠
# コンテナ名: okegawaatclink-gaido-dataagent-output-system
# ネットワーク: okegawaatclink-gaido-dataagent-network (external)
# フロントエンドポート: 3001
# バックエンドポート: 3002
# =============================================================================

services:
  web:
    build:
      # ビルドコンテキストをルート階層に設定
      # これにより ssl-certificates/ ディレクトリをDockerfileからCOPYできる
      # （output_system/ からの相対パスでは ../ssl-certificates/ が使えないため）
      context: ..
      dockerfile: output_system/Dockerfile
      args:
        # フロントエンドに埋め込むバージョン文字列（gitハッシュ+日付）
        APP_VERSION: "${APP_VERSION:-unknown}"

    # instance-config.md の「コンテナ名（フロントエンド）」に合わせる
    # AI Agent containerからこの名前でアクセス可能になる
    container_name: okegawaatclink-gaido-dataagent-output-system

    # ホスト側ポートとコンテナ内ポートのマッピング
    # 環境変数が未設定の場合はデフォルト値（3001/3002）を使用
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
      - "${BACKEND_PORT:-3002}:3002"

    # .env ファイルから環境変数を読み込む
    # .env.example をコピーして .env を作成し、実際の値を設定すること
    env_file:
      - .env

    environment:
      # Vite 5.x以降はデフォルトでlocalhost以外のホスト名からのアクセスをブロックする
      # コンテナ名でのアクセスを許可するために追加設定が必要
      # constraints.md の「Viteのホスト制限」参照
      - __VITE_ADDITIONAL_SERVER_ALLOWED_HOSTS=okegawaatclink-gaido-dataagent-output-system

    # ヘルスチェック設定
    # バックエンドの /api/health エンドポイントで死活監視
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # ==========================================================================
    # ボリューム設定（SQLite 履歴DB の永続化）
    # constraints.md の「docker-compose使用ルール」に従い、ホストバインドマウントは
    # 使用せず Docker named volume で永続化する。
    # ==========================================================================
    volumes:
      # history-data: SQLite DBファイル（/app/data/history.sqlite）を永続化
      # コンテナを再起動・再ビルドしても会話履歴が保持される
      - history-data:/app/data

    # webコンテナはMySQLの起動完了を待ってから起動する
    depends_on:
      mysql:
        condition: service_healthy

  # ===========================================================================
  # MySQL サーバー
  # DataAgentが接続するユーザーDB（分析対象データ用）
  # ===========================================================================
  mysql:
    image: mysql:8.0
    container_name: okegawaatclink-gaido-dataagent-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-sampledb}
      MYSQL_USER: ${DB_USER:-readonly_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-readonlypass}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # phpMyAdmin
  # ブラウザからMySQLを管理するためのGUIツール
  # ===========================================================================
  phpmyadmin:
    image: phpmyadmin:5
    container_name: okegawaatclink-gaido-dataagent-phpmyadmin
    environment:
      PMA_HOST: okegawaatclink-gaido-dataagent-mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      UPLOAD_LIMIT: 64M
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    depends_on:
      mysql:
        condition: service_healthy

# =============================================================================
# ボリューム定義
# =============================================================================
volumes:
  # SQLite 履歴DB用の named volume
  history-data:
  # MySQL データ永続化用の named volume
  mysql-data:

# =============================================================================
# ネットワーク設定
# AI Agent containerと同一ネットワークに参加することで
# コンテナ名でのアクセスが可能になる
# =============================================================================
networks:
  default:
    # instance-config.md の「Dockerネットワーク名」に合わせる
    name: okegawaatclink-gaido-dataagent-network
    # external: true で既存のネットワークを使用（AI Agent containerが管理）
    external: true
