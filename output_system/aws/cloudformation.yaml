AWSTemplateFormatVersion: '2010-09-09'
Description: >
  DataAgent ECS Fargate deployment.
  Web(frontend+backend) + MySQL + phpMyAdmin in a single Fargate task.
  EFS for SQLite history and MySQL data persistence.

# =============================================================================
# Parameters
# =============================================================================
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Existing VPC ID

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least 2 subnets in different AZs (for ALB)

  DbEncryptionKey:
    Type: String
    NoEcho: true
    Default: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
    Description: AES-256-GCM encryption key for DB passwords (64 hex chars)

  MysqlRootPassword:
    Type: String
    NoEcho: true
    Default: rootpassword
    Description: MySQL root password

  MysqlUser:
    Type: String
    Default: readonly_user

  MysqlPassword:
    Type: String
    NoEcho: true
    Default: readonlypass

  MysqlDatabase:
    Type: String
    Default: sampledb

  WebImageUri:
    Type: String
    Description: ECR image URI for the web container (e.g. 123456789012.dkr.ecr.ap-northeast-1.amazonaws.com/dataagent:latest)

  TaskCpu:
    Type: String
    Default: '1024'
    AllowedValues: ['512', '1024', '2048', '4096']
    Description: Task CPU units (1024 = 1 vCPU)

  TaskMemory:
    Type: String
    Default: '2048'
    AllowedValues: ['1024', '2048', '3072', '4096', '8192']
    Description: Task memory in MB

  CertificateArn:
    Type: String
    Default: ''
    Description: (Optional) ACM certificate ARN for HTTPS

Conditions:
  HasCertificate: !Not [!Equals [!Ref CertificateArn, '']]

Resources:
  # ===========================================================================
  # ECS Cluster
  # ===========================================================================
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: dataagent-cluster
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  # ===========================================================================
  # Security Groups
  # ===========================================================================
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB security group for DataAgent
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: dataagent-alb-sg

  TaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS task security group for DataAgent
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        # ALB -> Frontend
        - IpProtocol: tcp
          FromPort: 3001
          ToPort: 3001
          SourceSecurityGroupId: !Ref AlbSecurityGroup
        # ALB -> Backend API
        - IpProtocol: tcp
          FromPort: 3002
          ToPort: 3002
          SourceSecurityGroupId: !Ref AlbSecurityGroup
        # ALB -> phpMyAdmin
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      Tags:
        - Key: Name
          Value: dataagent-task-sg

  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EFS security group for DataAgent
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref TaskSecurityGroup
      Tags:
        - Key: Name
          Value: dataagent-efs-sg

  # ===========================================================================
  # EFS (Elastic File System) - SQLite + MySQL data persistence
  # ===========================================================================
  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      Encrypted: true
      FileSystemTags:
        - Key: Name
          Value: dataagent-efs

  # Mount targets (one per subnet)
  MountTarget0:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Select [0, !Ref SubnetIds]
      SecurityGroups:
        - !Ref EfsSecurityGroup

  MountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Select [1, !Ref SubnetIds]
      SecurityGroups:
        - !Ref EfsSecurityGroup

  # Access point for SQLite history data
  HistoryAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref FileSystem
      PosixUser:
        Uid: '1000'
        Gid: '1000'
      RootDirectory:
        Path: /history-data
        CreationInfo:
          OwnerUid: '1000'
          OwnerGid: '1000'
          Permissions: '755'

  # Access point for MySQL data
  MysqlAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref FileSystem
      PosixUser:
        Uid: '999'
        Gid: '999'
      RootDirectory:
        Path: /mysql-data
        CreationInfo:
          OwnerUid: '999'
          OwnerGid: '999'
          Permissions: '755'

  # ===========================================================================
  # CloudWatch Log Group
  # ===========================================================================
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/dataagent
      RetentionInDays: 30

  # ===========================================================================
  # IAM Roles
  # ===========================================================================
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dataagent-task-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dataagent-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: bedrock-invoke
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: 'arn:aws:bedrock:*::foundation-model/anthropic.*'

  # ===========================================================================
  # ALB (Application Load Balancer)
  # ===========================================================================
  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: dataagent-alb
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets: !Ref SubnetIds

  # Target group for frontend (port 3001)
  FrontendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: dataagent-frontend-tg
      Port: 3001
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  # Target group for backend API (port 3002)
  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: dataagent-backend-tg
      Port: 3002
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: /api/health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  # HTTP Listener (port 80)
  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - !If
          - HasCertificate
          - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: '443'
              StatusCode: HTTP_301
          - Type: forward
            TargetGroupArn: !Ref FrontendTargetGroup

  # HTTPS Listener (port 443, optional)
  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref FrontendTargetGroup

  # /api/* -> Backend target group
  ApiListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !If
        - HasCertificate
        - !Ref HttpsListener
        - !Ref HttpListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values:
            - /api/*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  # ===========================================================================
  # ECS Task Definition
  # ===========================================================================
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: dataagent
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn

      # EFS volumes
      Volumes:
        - Name: history-data
          EFSVolumeConfiguration:
            FilesystemId: !Ref FileSystem
            TransitEncryption: ENABLED
            AuthorizationConfig:
              AccessPointId: !Ref HistoryAccessPoint
              IAM: DISABLED
        - Name: mysql-data
          EFSVolumeConfiguration:
            FilesystemId: !Ref FileSystem
            TransitEncryption: ENABLED
            AuthorizationConfig:
              AccessPointId: !Ref MysqlAccessPoint
              IAM: DISABLED

      ContainerDefinitions:
        # ----- MySQL container -----
        - Name: mysql
          Image: mysql:8.0
          Essential: true
          Environment:
            - Name: MYSQL_ROOT_PASSWORD
              Value: !Ref MysqlRootPassword
            - Name: MYSQL_DATABASE
              Value: !Ref MysqlDatabase
            - Name: MYSQL_USER
              Value: !Ref MysqlUser
            - Name: MYSQL_PASSWORD
              Value: !Ref MysqlPassword
          PortMappings:
            - ContainerPort: 3306
          MountPoints:
            - SourceVolume: mysql-data
              ContainerPath: /var/lib/mysql
          HealthCheck:
            Command:
              - CMD
              - mysqladmin
              - ping
              - -h
              - localhost
            Interval: 10
            Timeout: 5
            Retries: 5
            StartPeriod: 60
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: mysql

        # ----- Web container (frontend + backend) -----
        - Name: web
          Image: !Ref WebImageUri
          Essential: true
          DependsOn:
            - ContainerName: mysql
              Condition: HEALTHY
          Environment:
            - Name: USE_BEDROCK
              Value: 'true'
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: DB_ENCRYPTION_KEY
              Value: !Ref DbEncryptionKey
            - Name: DB_TYPE
              Value: mysql
            - Name: DB_HOST
              Value: localhost
            - Name: DB_PORT
              Value: '3306'
            - Name: DB_USER
              Value: !Ref MysqlUser
            - Name: DB_PASSWORD
              Value: !Ref MysqlPassword
            - Name: DB_NAME
              Value: !Ref MysqlDatabase
            - Name: MYSQL_ROOT_PASSWORD
              Value: !Ref MysqlRootPassword
            - Name: BACKEND_PORT
              Value: '3002'
            - Name: FRONTEND_PORT
              Value: '3001'
            - Name: CORS_ALLOWED_ORIGINS
              Value: !Sub
                - 'http://${AlbDns},https://${AlbDns}'
                - AlbDns: !GetAtt Alb.DNSName
            - Name: VITE_API_BASE_URL
              Value: ''
            - Name: __VITE_ADDITIONAL_SERVER_ALLOWED_HOSTS
              Value: '.amazonaws.com'
          PortMappings:
            - ContainerPort: 3001
            - ContainerPort: 3002
          MountPoints:
            - SourceVolume: history-data
              ContainerPath: /app/data
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:3002/api/health || exit 1
            Interval: 30
            Timeout: 10
            Retries: 3
            StartPeriod: 60
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: web

        # ----- phpMyAdmin container -----
        - Name: phpmyadmin
          Image: phpmyadmin:5
          Essential: false
          DependsOn:
            - ContainerName: mysql
              Condition: HEALTHY
          Environment:
            - Name: PMA_HOST
              Value: localhost
            - Name: PMA_PORT
              Value: '3306'
            - Name: MYSQL_ROOT_PASSWORD
              Value: !Ref MysqlRootPassword
          PortMappings:
            - ContainerPort: 80
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: phpmyadmin

  # ===========================================================================
  # ECS Service
  # ===========================================================================
  EcsService:
    Type: AWS::ECS::Service
    DependsOn:
      - HttpListener
      - MountTarget0
      - MountTarget1
    Properties:
      ServiceName: dataagent-service
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      PlatformVersion: LATEST
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref TaskSecurityGroup
          Subnets: !Ref SubnetIds
      LoadBalancers:
        - ContainerName: web
          ContainerPort: 3001
          TargetGroupArn: !Ref FrontendTargetGroup
        - ContainerName: web
          ContainerPort: 3002
          TargetGroupArn: !Ref BackendTargetGroup
      HealthCheckGracePeriodSeconds: 120

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  ClusterName:
    Value: !Ref EcsCluster

  ServiceName:
    Value: !GetAtt EcsService.Name

  AlbDnsName:
    Description: ALB DNS name (access the app here)
    Value: !Sub http://${Alb.DNSName}

  AlbArn:
    Value: !Ref Alb

  EfsFileSystemId:
    Value: !Ref FileSystem
