openapi: 3.0.0
info:
  title: JSONPlaceholder API
  description: Free fake REST API for testing and prototyping. Provides users, posts, comments, albums, photos, and todos.
  version: "1.0"
servers:
  - url: https://jsonplaceholder.typicode.com
paths:
  /users:
    get:
      operationId: getUsers
      summary: Get all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
  /users/{id}:
    get:
      operationId: getUserById
      summary: Get a user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /posts:
    get:
      operationId: getPosts
      summary: Get all posts
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: integer
          description: Filter posts by user ID
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
  /posts/{id}:
    get:
      operationId: getPostById
      summary: Get a post by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
  /posts/{id}/comments:
    get:
      operationId: getCommentsByPost
      summary: Get comments for a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
  /comments:
    get:
      operationId: getComments
      summary: Get all comments
      parameters:
        - name: postId
          in: query
          required: false
          schema:
            type: integer
          description: Filter comments by post ID
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
  /todos:
    get:
      operationId: getTodos
      summary: Get all todos
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: integer
          description: Filter todos by user ID
        - name: completed
          in: query
          required: false
          schema:
            type: boolean
          description: Filter by completion status
      responses:
        "200":
          description: List of todos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Todo"
  /albums:
    get:
      operationId: getAlbums
      summary: Get all albums
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: integer
          description: Filter albums by user ID
      responses:
        "200":
          description: List of albums
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Album"
  /photos:
    get:
      operationId: getPhotos
      summary: Get all photos
      parameters:
        - name: albumId
          in: query
          required: false
          schema:
            type: integer
          description: Filter photos by album ID
      responses:
        "200":
          description: List of photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        username:
          type: string
        email:
          type: string
        phone:
          type: string
        website:
          type: string
        address:
          $ref: "#/components/schemas/Address"
        company:
          $ref: "#/components/schemas/Company"
    Address:
      type: object
      properties:
        street:
          type: string
        suite:
          type: string
        city:
          type: string
        zipcode:
          type: string
    Company:
      type: object
      properties:
        name:
          type: string
        catchPhrase:
          type: string
        bs:
          type: string
    Post:
      type: object
      properties:
        userId:
          type: integer
        id:
          type: integer
        title:
          type: string
        body:
          type: string
    Comment:
      type: object
      properties:
        postId:
          type: integer
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        body:
          type: string
    Todo:
      type: object
      properties:
        userId:
          type: integer
        id:
          type: integer
        title:
          type: string
        completed:
          type: boolean
    Album:
      type: object
      properties:
        userId:
          type: integer
        id:
          type: integer
        title:
          type: string
    Photo:
      type: object
      properties:
        albumId:
          type: integer
        id:
          type: integer
        title:
          type: string
        url:
          type: string
        thumbnailUrl:
          type: string
